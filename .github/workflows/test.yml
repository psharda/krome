        with:
          name: outputs-full_collapse
          path: testoutputs/
          if-no-files-found: warn

      - name: Write job summary
        if: always()
        run: |
          if [ "${{ steps.run_test.outcome }}" == "success" ]; then
            STATUS="✅ Passed"
          else
            STATUS="❌ Failed"
          fi
          echo "## full_collapse" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Executables | \`test\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Outputs | \`fort.22\`, \`fort.31\`, \`fort.911\`, \`CollapseTgas_Metallicities*\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Total time | ${{ steps.run_test.outputs.total_time }}s |" >> $GITHUB_STEP_SUMMARY

  full_RolligPDR:
